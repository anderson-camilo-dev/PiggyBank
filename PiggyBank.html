<!doctype html>
<html lang="pt-br">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiggyBank</title>
    <link
      rel="shortcut icon"
      hre
  <body >
    <header>
      <div class="logo-div">
        <img class="logo" src="./img/logo.png" alt="" />

        <h2 class="logo-titulo">PiggyBank</h2>
      </div>
      <div class="usuario-div">
        <img class="img-usuario" src="./img/usuario.png" alt="" />
        <img class="svg" src="./img/icons/icon-icons.svg" alt="" />
      </div>
    </header>

    <main>
      <div class="cards-div">
        <div class="card1">
          <h2>Saldo</h2>
          <h2 id="resultado-entrada">R$ <span id="resultado-entrada">0,00</span></h2>
        </div>

        <div class="card2">
          <h2>Dispesas</h2>
          <h2 id="resultado-saida">R$ <span id="resultado-saida">0,00</span></h2>
        </div>

        <div class="card3">
          <h2>Saldo final</h2>
          <div class="resultado-final">
            <img class="img-seta" src="" alt="">
          <h2 id="resultado-total"> R$ <span id="resultado-total">0,00</span></h2>
          </div>
        </div>
      </div>

      <div class="div-conteudos">
        <div class="nova-transacao-div">
          <h1>Nova Transação</h1>
          <input
          
            class="input-transacao"
            type="text"
            placeholder="Nome da Transação"
            name="nome-transacao"
            id="nome-transacao"
          />
          <input
            class="input-transacao"
            type="number"
            placeholder="Valor da Transação"
            name=""
            id="valor-transacao"
          />
          <input
            class="input-transacao"
            type="text"
            placeholder="Categoria"
            name=""
            id="categoria-transacao"
          />
          <div class="div-opcoes-1">
           <p class="opcoesP">Adicionar: </p>
          <div class="div-opcoes">
            <div>
          <input class="opcoes" type="radio" name="opcao" id="entrada" value="Adicionar Saldo" checked>
          <label for="entrada" > Saldo</label>
          </div>
          <div>
          <input class="opcoes" type="radio" name="opcao" id="saida" value="Adicionar Dispesa">
          <label for="saida"> Dispesa</label>
          </div>
          </div>
</div>
          <input class="botão-adicionar" type="button" value="Adicionar" onclick="transacoes.Adicionar()"  />
        </div>

        <div class="historico-div">
          <h1>Histórico de Transações</h1>
          <div class="resultado-lista">
           

            <p class="texto-vazio">nenhuma Transação feita ainda</p>

            
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
